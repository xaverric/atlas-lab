<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" fill="none">
  <!-- Network/molecule icon -->
  <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Nodes -->
    <circle cx="12" cy="28" r="3.5" fill="none"/>
    <circle cx="26" cy="20" r="3" fill="none"/>
    <circle cx="18" cy="8" r="2.5" fill="none"/>
    <circle cx="32" cy="10" r="2.5" fill="none"/>
    <!-- Connections -->
    <line x1="14.5" y1="26" x2="23.5" y2="21.5"/>
    <line x1="19.5" y1="10" x2="24" y2="18"/>
    <line x1="28.5" y1="18.5" x2="30" y2="12"/>
  </g>
  <!-- "atlas" text -->
  <text x="42" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" letter-spacing="-0.5" fill="currentColor">atlas</text>
</svg>
