version: 2

updates:
  # npm — root + all workspaces
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 10
    groups:
      # Group minor+patch updates to reduce PR noise
      npm-minor-patch:
        update-types: [minor, patch]
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"

  # Docker — scan all Dockerfiles
  - package-ecosystem: docker
    directory: /apps/atlas-core
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /apps/atlas-dms
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: node
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /apps/atlas-scheduler
