name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: atlas-core, dockerfile: apps/atlas-core/Dockerfile }
          - { name: atlas-dms, dockerfile: apps/atlas-dms/Dockerfile }
          - { name: atlas-scheduler, dockerfile: apps/atlas-scheduler/Dockerfile }
          - { name: atlas-notify, dockerfile: apps/atlas-notify/Dockerfile }
          - { name: atlas-notes, dockerfile: apps/atlas-notes/Dockerfile }
          - { name: atlas-tracker, dockerfile: apps/atlas-tracker/Dockerfile }
          - { name: atlas-mcp, dockerfile: apps/atlas-mcp/Dockerfile }
          - { name: atlas-gui, dockerfile: apps/atlas-gui/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: xaverric/atlas-lab-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=stable

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Create or update release branch
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          MAJOR_MINOR=$(echo "${VERSION#v}" | cut -d. -f1,2)
          git fetch origin "release/v${MAJOR_MINOR}" 2>/dev/null || true
          if git show-ref --verify "refs/remotes/origin/release/v${MAJOR_MINOR}" >/dev/null 2>&1; then
            echo "Release branch release/v${MAJOR_MINOR} already exists, updating..."
            git checkout "release/v${MAJOR_MINOR}"
            git merge --ff-only "${GITHUB_SHA}" || git merge -m "Merge ${VERSION} into release branch" "${GITHUB_SHA}"
          else
            echo "Creating release branch release/v${MAJOR_MINOR}"
            git checkout -b "release/v${MAJOR_MINOR}"
          fi
          git push origin "release/v${MAJOR_MINOR}"
