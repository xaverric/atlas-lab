name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags: ["v*"]

permissions:
  checks: write
  contents: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: atlas-core, dockerfile: apps/atlas-core/Dockerfile }
          - { name: atlas-dms, dockerfile: apps/atlas-dms/Dockerfile }
          - {
              name: atlas-scheduler,
              dockerfile: apps/atlas-scheduler/Dockerfile,
            }
          - { name: atlas-notify, dockerfile: apps/atlas-notify/Dockerfile }
          - { name: atlas-notes, dockerfile: apps/atlas-notes/Dockerfile }
          - { name: atlas-tracker, dockerfile: apps/atlas-tracker/Dockerfile }
          - { name: atlas-mcp, dockerfile: apps/atlas-mcp/Dockerfile }
          - { name: atlas-gui, dockerfile: apps/atlas-gui/Dockerfile }
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: xaverric/atlas-lab-${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          sbom: true
          provenance: true

  security:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            atlas-core,
            atlas-dms,
            atlas-scheduler,
            atlas-notify,
            atlas-notes,
            atlas-gui,
            atlas-mcp,
            atlas-tracker,
          ]
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-${{ matrix.service }}:${{ github.ref_name }}
      service_name: ${{ matrix.service }}
    secrets: inherit

  promote-stable:
    needs: [build, security]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            atlas-core,
            atlas-dms,
            atlas-scheduler,
            atlas-notify,
            atlas-notes,
            atlas-gui,
            atlas-mcp,
            atlas-tracker,
          ]
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote release image to stable
        run: |
          docker buildx imagetools create \
            --tag "xaverric/atlas-lab-${{ matrix.service }}:stable" \
            "xaverric/atlas-lab-${{ matrix.service }}:${{ github.ref_name }}"

  release:
    needs: promote-stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true

      - name: Create or update release branch
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          MAJOR_MINOR=$(echo "${VERSION#v}" | cut -d. -f1,2)
          git fetch origin "release/v${MAJOR_MINOR}" 2>/dev/null || true
          if git show-ref --verify "refs/remotes/origin/release/v${MAJOR_MINOR}" >/dev/null 2>&1; then
            echo "Release branch release/v${MAJOR_MINOR} already exists, updating..."
            git checkout "release/v${MAJOR_MINOR}"
            git merge --ff-only "${GITHUB_SHA}" || git merge -m "Merge ${VERSION} into release branch" "${GITHUB_SHA}"
          else
            echo "Creating release branch release/v${MAJOR_MINOR}"
            git checkout -b "release/v${MAJOR_MINOR}"
          fi
          git push origin "release/v${MAJOR_MINOR}"
