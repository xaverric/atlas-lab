name: Nightly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  security-events: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: atlas-core, dockerfile: apps/atlas-core/Dockerfile }
          - { name: atlas-dms, dockerfile: apps/atlas-dms/Dockerfile }
          - {
              name: atlas-scheduler,
              dockerfile: apps/atlas-scheduler/Dockerfile,
            }
          - { name: atlas-notify, dockerfile: apps/atlas-notify/Dockerfile }
          - { name: atlas-notes, dockerfile: apps/atlas-notes/Dockerfile }
          - { name: atlas-tracker, dockerfile: apps/atlas-tracker/Dockerfile }
          - { name: atlas-mcp, dockerfile: apps/atlas-mcp/Dockerfile }
          - { name: atlas-gui, dockerfile: apps/atlas-gui/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get date tag
        id: date
        run: echo "tag=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            xaverric/atlas-lab-${{ matrix.service.name }}:nightly
            xaverric/atlas-lab-${{ matrix.service.name }}:nightly-${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  dependency-health:
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check outdated dependencies
        run: |
          echo "### Outdated Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm outdated --long 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Audit report
        run: |
          echo "### Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  security:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            atlas-core,
            atlas-dms,
            atlas-scheduler,
            atlas-notify,
            atlas-notes,
            atlas-gui,
            atlas-mcp,
            atlas-tracker,
          ]
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-${{ matrix.service }}:nightly
      service_name: ${{ matrix.service }}
    secrets: inherit
