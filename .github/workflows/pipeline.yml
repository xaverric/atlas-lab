name: Pipeline

on:
  push:
    branches: [main, 'feature/*']
    paths-ignore: ['docs/**', '*.md', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE']

permissions:
  checks: write
  contents: read
  security-events: write
  pages: write
  id-token: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: atlas-core, dockerfile: apps/atlas-core/Dockerfile }
          - { name: atlas-dms, dockerfile: apps/atlas-dms/Dockerfile }
          - { name: atlas-scheduler, dockerfile: apps/atlas-scheduler/Dockerfile }
          - { name: atlas-notify, dockerfile: apps/atlas-notify/Dockerfile }
          - { name: atlas-notes, dockerfile: apps/atlas-notes/Dockerfile }
          - { name: atlas-tracker, dockerfile: apps/atlas-tracker/Dockerfile }
          - { name: atlas-mcp, dockerfile: apps/atlas-mcp/Dockerfile }
          - { name: atlas-gui, dockerfile: apps/atlas-gui/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            xaverric/atlas-lab-${{ matrix.service.name }}:dev
            xaverric/atlas-lab-${{ matrix.service.name }}:${{ needs.ci.outputs.sha_short }}
            xaverric/atlas-lab-${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          sbom: true
          provenance: true

  security-core:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-core:dev
      service_name: atlas-core
    secrets: inherit

  security-dms:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-dms:dev
      service_name: atlas-dms
    secrets: inherit

  security-scheduler:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-scheduler:dev
      service_name: atlas-scheduler
    secrets: inherit

  security-notify:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-notify:dev
      service_name: atlas-notify
    secrets: inherit

  security-notes:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-notes:dev
      service_name: atlas-notes
    secrets: inherit

  security-gui:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-gui:dev
      service_name: atlas-gui
    secrets: inherit

  security-mcp:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-mcp:dev
      service_name: atlas-mcp
    secrets: inherit

  security-tracker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-tracker:dev
      service_name: atlas-tracker
    secrets: inherit

  publish-reports:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && always()
    needs: [ci, security-core, security-dms, security-scheduler, security-notify, security-notes, security-gui, security-mcp, security-tracker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: security-*
          path: reports/security/

      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: reports/tests/

      - name: Build unified report
        env:
          SHA: ${{ needs.ci.outputs.sha_short }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          SERVICES="atlas-core atlas-dms atlas-scheduler atlas-notify atlas-notes atlas-gui atlas-mcp atlas-tracker"

          # Build sections from each service report
          SECTIONS=""
          for svc in $SERVICES; do
            DIR="reports/security/security-${svc}"
            if [ -f "${DIR}/trivy-results.txt" ]; then
              RESULTS=$(cat "${DIR}/trivy-results.txt")
              CRITICAL=$(grep -o '"Severity": "CRITICAL"' "${DIR}/trivy.json" 2>/dev/null | wc -l | tr -d ' ')
              HIGH=$(grep -o '"Severity": "HIGH"' "${DIR}/trivy.json" 2>/dev/null | wc -l | tr -d ' ')
              MEDIUM=$(grep -o '"Severity": "MEDIUM"' "${DIR}/trivy.json" 2>/dev/null | wc -l | tr -d ' ')
              TOTAL=$((CRITICAL + HIGH + MEDIUM))

              if [ "${TOTAL}" -eq "0" ]; then
                STATUS_CLASS="pass"
                STATUS_TEXT="PASS"
              else
                STATUS_CLASS="fail"
                STATUS_TEXT="${TOTAL} issues"
              fi

              SECTIONS="${SECTIONS}
              <div class='service'>
                <div class='service-header' onclick='this.parentElement.classList.toggle(\"collapsed\")'>
                  <h2>${svc} <span class='badge ${STATUS_CLASS}'>${STATUS_TEXT}</span></h2>
                  <div class='counts'>
                    <span class='c'>C:${CRITICAL}</span>
                    <span class='h'>H:${HIGH}</span>
                    <span class='m'>M:${MEDIUM}</span>
                  </div>
                </div>
                <pre class='details'>${RESULTS}</pre>
              </div>"
            fi
          done

          cat > reports/index.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Atlas Lab — Security Report</title>
            <style>
              * { box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; color: #1a1a2e; background: #fafafa; }
              h1 { margin: 0 0 4px; font-size: 24px; }
              .meta { color: #666; font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
              .meta code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
              .meta a { color: #2563eb; }
              .service { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
              .service-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; user-select: none; }
              .service-header:hover { background: #f8f8f8; }
              .service-header h2 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 10px; }
              .counts { display: flex; gap: 8px; font-size: 13px; font-weight: 600; }
              .counts .c { color: #dc2626; }
              .counts .h { color: #ea580c; }
              .counts .m { color: #ca8a04; }
              .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
              .badge.pass { background: #dcfce7; color: #166534; }
              .badge.fail { background: #fef2f2; color: #991b1b; }
              .details { margin: 0; padding: 12px 16px; font-size: 12px; line-height: 1.4; background: #f9fafb; border-top: 1px solid #e0e0e0; overflow-x: auto; white-space: pre; }
              .service.collapsed .details { display: none; }
              .hint { text-align: center; color: #999; font-size: 12px; margin-top: 8px; }
            </style>
          </head>
          <body>
            <h1>Atlas Lab — Security Report</h1>
            <div class="meta">
              <strong>Branch:</strong> ${BRANCH} &nbsp;|&nbsp;
              <strong>Commit:</strong> <code>${SHA}</code> &nbsp;|&nbsp;
              <strong>Date:</strong> ${DATE}<br>
              <strong>Message:</strong> ${COMMIT_MSG%%$'\n'*}<br>
              <a href="https://github.com/xaverric/atlas-lab/actions/runs/${RUN_ID}">View Pipeline Run</a>
            </div>
            ${SECTIONS}
            <p class="hint">Click a section header to collapse/expand. Reports retained for 90 days.</p>
          </body>
          </html>
          HTMLEOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - uses: actions/deploy-pages@v4
