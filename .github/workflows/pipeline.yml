name: Pipeline

on:
  push:
    branches: [main, 'feature/*']
    paths-ignore: ['docs/**', '*.md', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE']

permissions:
  checks: write
  contents: read
  security-events: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: atlas-core, dockerfile: apps/atlas-core/Dockerfile }
          - { name: atlas-dms, dockerfile: apps/atlas-dms/Dockerfile }
          - { name: atlas-scheduler, dockerfile: apps/atlas-scheduler/Dockerfile }
          - { name: atlas-notify, dockerfile: apps/atlas-notify/Dockerfile }
          - { name: atlas-notes, dockerfile: apps/atlas-notes/Dockerfile }
          - { name: atlas-tracker, dockerfile: apps/atlas-tracker/Dockerfile }
          - { name: atlas-mcp, dockerfile: apps/atlas-mcp/Dockerfile }
          - { name: atlas-gui, dockerfile: apps/atlas-gui/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            xaverric/atlas-lab-${{ matrix.service.name }}:dev
            xaverric/atlas-lab-${{ matrix.service.name }}:${{ needs.ci.outputs.sha_short }}
            xaverric/atlas-lab-${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          sbom: true
          provenance: true

  security-core:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-core:dev
      service_name: atlas-core
    secrets: inherit

  security-dms:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-dms:dev
      service_name: atlas-dms
    secrets: inherit

  security-scheduler:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-scheduler:dev
      service_name: atlas-scheduler
    secrets: inherit

  security-notify:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-notify:dev
      service_name: atlas-notify
    secrets: inherit

  security-notes:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-notes:dev
      service_name: atlas-notes
    secrets: inherit

  security-gui:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-gui:dev
      service_name: atlas-gui
    secrets: inherit

  security-mcp:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-mcp:dev
      service_name: atlas-mcp
    secrets: inherit

  security-tracker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      image: xaverric/atlas-lab-atlas-tracker:dev
      service_name: atlas-tracker
    secrets: inherit
