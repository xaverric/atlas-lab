name: Security Scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      image:
        description: Full image name with tag to scan
        required: true
        type: string
      service_name:
        description: Service name for report naming
        required: true
        type: string
      fail_on_severities:
        description: Comma-separated severities that should fail the workflow
        required: false
        default: CRITICAL,HIGH
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy — vulnerability table
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-results.txt

      - name: Trivy — SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ inputs.service_name }}

      - name: Trivy — SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: cyclonedx
          output: sbom.json

      - name: Trivy — JSON
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ inputs.image }}
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH,MEDIUM

      - name: Generate HTML report
        if: always()
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE: ${{ inputs.image }}
        run: |
          CRITICAL=$(grep -o '"Severity": "CRITICAL"' trivy.json 2>/dev/null | wc -l | tr -d ' ')
          HIGH=$(grep -o '"Severity": "HIGH"' trivy.json 2>/dev/null | wc -l | tr -d ' ')
          MEDIUM=$(grep -o '"Severity": "MEDIUM"' trivy.json 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((CRITICAL + HIGH + MEDIUM))
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          cat > security-report.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Security Report — ${SERVICE}</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #1a1a2e; }
              h1 { border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
              .meta { color: #666; font-size: 14px; margin-bottom: 20px; }
              .summary { display: flex; gap: 16px; margin: 20px 0; }
              .card { padding: 16px 24px; border-radius: 8px; text-align: center; flex: 1; }
              .critical { background: #fef2f2; border: 1px solid #fca5a5; }
              .critical .count { color: #dc2626; font-size: 32px; font-weight: bold; }
              .high { background: #fff7ed; border: 1px solid #fdba74; }
              .high .count { color: #ea580c; font-size: 32px; font-weight: bold; }
              .medium { background: #fefce8; border: 1px solid #fde047; }
              .medium .count { color: #ca8a04; font-size: 32px; font-weight: bold; }
              .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666; }
              pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
              .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
              .badge-pass { background: #dcfce7; color: #166534; }
              .badge-fail { background: #fef2f2; color: #991b1b; }
            </style>
          </head>
          <body>
            <h1>Security Report: ${SERVICE}</h1>
            <div class="meta">
              <strong>Image:</strong> ${IMAGE}<br>
              <strong>Scanned:</strong> ${DATE}<br>
              <strong>Status:</strong> <span class="badge $([ "${TOTAL}" -eq "0" ] && echo badge-pass || echo badge-fail)">$([ "${TOTAL}" -eq "0" ] && echo PASS || echo "${TOTAL} vulnerabilities")</span>
            </div>
            <div class="summary">
              <div class="card critical"><div class="count">${CRITICAL}</div><div class="label">Critical</div></div>
              <div class="card high"><div class="count">${HIGH}</div><div class="label">High</div></div>
              <div class="card medium"><div class="count">${MEDIUM}</div><div class="label">Medium</div></div>
            </div>
            <h2>Vulnerability Details</h2>
            <pre>$(cat trivy-results.txt)</pre>
          </body>
          </html>
          HTMLEOF

          echo "### Security: ${SERVICE}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CRITICAL | ${CRITICAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HIGH | ${HIGH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MEDIUM | ${MEDIUM} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-${{ inputs.service_name }}
          path: |
            security-report.html
            trivy-results.txt
            trivy.json
            sbom.json
          retention-days: 90

      - name: Docker Scout — CVEs
        uses: docker/scout-action@v1.20.3
        if: always()
        continue-on-error: true
        with:
          command: cves
          image: ${{ inputs.image }}
          only-severities: critical,high
          summary: true

      - name: Docker Scout — recommendations
        uses: docker/scout-action@v1.20.3
        if: always()
        continue-on-error: true
        with:
          command: recommendations
          image: ${{ inputs.image }}

      - name: Enforce vulnerability policy
        if: always()
        env:
          SERVICE: ${{ inputs.service_name }}
          FAIL_ON_SEVERITIES: ${{ inputs.fail_on_severities }}
        run: |
          if [ ! -f trivy.json ]; then
            echo "::error::Missing trivy.json for ${SERVICE}"
            exit 1
          fi

          TOTAL=0
          IFS=',' read -ra SEVERITIES <<< "${FAIL_ON_SEVERITIES}"
          for severity in "${SEVERITIES[@]}"; do
            TRIMMED=$(echo "$severity" | xargs)
            COUNT=$(grep -o "\"Severity\": \"${TRIMMED}\"" trivy.json | wc -l | tr -d ' ')
            TOTAL=$((TOTAL + COUNT))
          done

          if [ "${TOTAL}" -gt 0 ]; then
            echo "::error::Found ${TOTAL} vulnerabilities matching policy (${FAIL_ON_SEVERITIES}) in ${SERVICE}"
            exit 1
          fi
