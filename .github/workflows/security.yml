name: Security Scan

on:
  workflow_call:
    inputs:
      image:
        description: Full image name with tag to scan
        required: true
        type: string
      service_name:
        description: Service name for report naming
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy — vulnerability table
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-results.txt

      - name: Trivy — SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ inputs.service_name }}

      - name: Trivy — SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: cyclonedx
          output: sbom.json

      - name: Trivy — JSON for detailed parsing
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ inputs.image }}
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH,MEDIUM

      - name: Vulnerability summary
        id: summary
        env:
          SERVICE: ${{ inputs.service_name }}
          IMAGE: ${{ inputs.image }}
        run: |
          CRITICAL=$(grep -o '"Severity": "CRITICAL"' trivy.json 2>/dev/null | wc -l | tr -d ' ')
          HIGH=$(grep -o '"Severity": "HIGH"' trivy.json 2>/dev/null | wc -l | tr -d ' ')
          MEDIUM=$(grep -o '"Severity": "MEDIUM"' trivy.json 2>/dev/null | wc -l | tr -d ' ')

          echo "critical=${CRITICAL}" >> "$GITHUB_OUTPUT"
          echo "high=${HIGH}" >> "$GITHUB_OUTPUT"

          echo "### Security Report: ${SERVICE}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CRITICAL | ${CRITICAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HIGH | ${HIGH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MEDIUM | ${MEDIUM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${CRITICAL:-0}" -gt "0" ]; then
            echo "**ACTION REQUIRED:** Critical vulnerabilities found. Update base image or affected packages." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep "CRITICAL" trivy-results.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${CRITICAL:-0}" -gt "0" ] || [ "${HIGH:-0}" -gt "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Remediation steps:**" >> "$GITHUB_STEP_SUMMARY"
            echo "1. Check if \`node:22-alpine\` has a newer patch: \`docker pull node:22-alpine\`" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Run \`npm audit fix\` to update vulnerable npm packages" >> "$GITHUB_STEP_SUMMARY"
            echo "3. Review Trivy results artifact for full details" >> "$GITHUB_STEP_SUMMARY"
            echo "4. Check Docker Scout on Docker Hub for recommendations" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-${{ inputs.service_name }}
          path: |
            trivy-results.txt
            trivy.json
            sbom.json
          retention-days: 90

      - name: Docker Scout — CVE analysis
        uses: docker/scout-action@v1
        if: always()
        with:
          command: cves
          image: ${{ inputs.image }}
          only-severities: critical,high
          summary: true

      - name: Docker Scout — recommendations
        uses: docker/scout-action@v1
        if: always()
        continue-on-error: true
        with:
          command: recommendations
          image: ${{ inputs.image }}
