name: Security Scan

on:
  workflow_call:
    inputs:
      image:
        description: Full image name with tag to scan
        required: true
        type: string
      service_name:
        description: Service name for report naming
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ inputs.image }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-results.txt

      - name: Run Trivy (SARIF for GitHub Security)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ inputs.image }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ inputs.service_name }}

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ inputs.image }}
          format: cyclonedx
          output: sbom.json

      - name: Check for critical vulnerabilities
        id: critical
        env:
          SERVICE: ${{ inputs.service_name }}
        run: |
          CRITICAL_COUNT=$(grep -c "CRITICAL" trivy-results.txt 2>/dev/null || echo "0")
          echo "count=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "## CRITICAL vulnerabilities found in ${SERVICE}" >> "$GITHUB_STEP_SUMMARY"
            cat trivy-results.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No critical vulnerabilities in ${SERVICE}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-${{ inputs.service_name }}
          path: |
            trivy-results.txt
            sbom.json
          retention-days: 90

      - name: Docker Scout CVEs
        uses: docker/scout-action@v1
        if: always()
        with:
          command: cves
          image: ${{ inputs.image }}
          only-severities: critical,high
          summary: true
