name: CI

on:
  workflow_call:
    outputs:
      sha_short:
        description: Short commit SHA for tagging
        value: ${{ jobs.ci.outputs.sha_short }}

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Test Report
        uses: dorny/test-reporter@v3.0.0
        if: always()
        with:
          name: Vitest Results
          path: test-results/junit.xml
          reporter: java-junit

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
