services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-certs:/acme
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.0
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KC_HOSTNAME}`)"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      - keycloak-db
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  atlas-core:
    image: ghcr.io/${GITHUB_REPO}/atlas-core:latest
    environment:
      MONGO_URI: mongodb://mongodb:27017/atlas
      KEYCLOAK_ISSUER: https://${KC_HOSTNAME}/realms/atlas
      CORS_ORIGIN: https://${ATLAS_DOMAIN}
      PORT: 4000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas-core.rule=Host(`${ATLAS_DOMAIN}`) && (PathPrefix(`/api/v1/users`) || Path(`/health`))"
      - "traefik.http.routers.atlas-core.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas-core.loadbalancer.server.port=4000"
    depends_on:
      - mongodb
      - keycloak
    restart: unless-stopped

  atlas-dms:
    image: ghcr.io/${GITHUB_REPO}/atlas-dms:latest
    environment:
      MONGO_URI: mongodb://mongodb:27017/atlas-dms
      KEYCLOAK_ISSUER: https://${KC_HOSTNAME}/realms/atlas
      CORS_ORIGIN: https://${ATLAS_DOMAIN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      PORT: 4001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas-dms.rule=Host(`${ATLAS_DOMAIN}`) && PathPrefix(`/api/v1/dms`)"
      - "traefik.http.routers.atlas-dms.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas-dms.loadbalancer.server.port=4001"
    depends_on:
      - mongodb
      - keycloak
      - minio
    restart: unless-stopped

  atlas-scheduler:
    image: ghcr.io/${GITHUB_REPO}/atlas-scheduler:latest
    environment:
      MONGO_URI: mongodb://mongodb:27017/atlas-scheduler
      KEYCLOAK_ISSUER: https://${KC_HOSTNAME}/realms/atlas
      CORS_ORIGIN: https://${ATLAS_DOMAIN}
      REDIS_HOST: redis
      PORT: 4002
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas-scheduler.rule=Host(`${ATLAS_DOMAIN}`) && PathPrefix(`/api/v1/scheduler`)"
      - "traefik.http.routers.atlas-scheduler.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas-scheduler.loadbalancer.server.port=4002"
    depends_on:
      - mongodb
      - keycloak
      - redis
    restart: unless-stopped

  atlas-notify:
    image: ghcr.io/${GITHUB_REPO}/atlas-notify:latest
    environment:
      MONGO_URI: mongodb://mongodb:27017/atlas-notify
      KEYCLOAK_ISSUER: https://${KC_HOSTNAME}/realms/atlas
      CORS_ORIGIN: https://${ATLAS_DOMAIN}
      REDIS_HOST: redis
      INTERNAL_KEY: ${INTERNAL_KEY}
      PORT: 4003
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas-notify.rule=Host(`${ATLAS_DOMAIN}`) && PathPrefix(`/api/v1/notifications`)"
      - "traefik.http.routers.atlas-notify.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas-notify.loadbalancer.server.port=4003"
    depends_on:
      - mongodb
      - keycloak
      - redis
    restart: unless-stopped

  atlas-gui:
    image: ghcr.io/${GITHUB_REPO}/atlas-gui:latest
    environment:
      NEXT_PUBLIC_API_URL: https://${ATLAS_DOMAIN}/api
      NEXT_PUBLIC_OIDC_AUTHORITY: https://${KC_HOSTNAME}/realms/atlas
      NEXT_PUBLIC_OIDC_CLIENT_ID: atlas-gui
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas-gui.rule=Host(`${ATLAS_DOMAIN}`)"
      - "traefik.http.routers.atlas-gui.tls.certresolver=letsencrypt"
      - "traefik.http.services.atlas-gui.loadbalancer.server.port=3000"
    depends_on:
      - atlas-core
    restart: unless-stopped

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`storage.${ATLAS_DOMAIN}`)"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  keycloak-db-data:
  traefik-certs:
  redis-data:
  minio-data:
